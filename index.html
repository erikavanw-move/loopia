<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOOPIA — Calendario de Running Argentina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>


<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo-block">
        <img src="img/logoloopia.png" alt="Loopia" class="logo-img" height="48">
        <div class="tagline">calendario de running argentina</div>
      </div>
      <span class="badge-beta">BETA</span>
    </div>

    <div class="header-stats">
      <div class="stat">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">carreras</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-trail">—</div>
        <div class="stat-label">trail</div>
      </div>
      <div class="stat">
        <div class="stat-num">8</div>
        <div class="stat-label">organizadores</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-proxima">—</div>
        <div class="stat-label">próxima</div>
      </div>
    </div>
  </header>

  <!-- TABS CALLE / TRAIL -->
  <nav class="tabs-bar" id="tabs-tipo">
    <button class="tab-btn active" data-tipo="todas">Todas</button>
    <button class="tab-btn trail-tab" data-tipo="trail">Trail / Montaña</button>
    <button class="tab-btn" data-tipo="calle">Calle</button>
  </nav>

  <!-- FILTRO DISTANCIAS -->
  <div class="filters-bar" id="filter-dist">
    <button class="chip active" data-d="todas">Todas</button>
    <button class="chip" data-d="3K">3K</button>
    <button class="chip" data-d="5K">5K</button>
    <button class="chip" data-d="10K">10K</button>
    <button class="chip" data-d="15K">15K</button>
    <button class="chip" data-d="21K">21K</button>
    <button class="chip" data-d="42K">42K</button>
    <button class="chip trail-chip" data-d="ultra">Ultra (50K+)</button>
    <button class="chip trail-chip" data-d="100M">100 Millas</button>
  </div>

  <!-- FILTRO PROVINCIAS -->
  <div class="filters-bar prov-bar" id="filter-prov">
    <button class="chip active" data-p="todas">Todo el país</button>
    <button class="chip" data-p="CABA/GBA">CABA / GBA</button>
    <button class="chip" data-p="Córdoba">Córdoba</button>
    <button class="chip" data-p="Rosario">Rosario</button>
    <button class="chip" data-p="Mendoza">Mendoza</button>
    <button class="chip" data-p="Patagonia">Patagonia</button>
    <button class="chip" data-p="Mar del Plata">Mar del Plata</button>
    <button class="chip" data-p="Jujuy">Jujuy</button>
    <button class="chip" data-p="San Juan">San Juan</button>
    <button class="chip" data-p="San Luis">San Luis</button>
    <button class="chip" data-p="Misiones">Misiones</button>
    <button class="chip" data-p="Internacional">🌎 Internacional</button>
  </div>

  <!-- RESULTADOS -->
  <div class="results-header">
    <span class="results-count" id="results-count">cargando...</span>
  </div>

  <!-- LISTADO DE CARRERAS -->
  <main class="cards-grid" id="cards-container"></main>

  <script src="data.js"></script>
  <script src="app.js"></script>

  <!-- FOOTER -->
  <footer class="footer">
    <img src="img/logoloopia.png" alt="Loopia" class="logo-img" height="48">
    <div class="footer-social">
      <a href="https://www.instagram.com/" target="_blank" rel="noopener" aria-label="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
          <circle cx="12" cy="12" r="4" />
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none" />
        </svg>
      </a>
      <a href="https://www.tiktok.com/" target="_blank" rel="noopener" aria-label="TikTok">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z" />
        </svg>
      </a>
    </div>
    <div class="footer-copy">© 2026 Loopia · Hecho con ❤️ para corredores argentinos</div>
  </footer>
</body>

</html>
